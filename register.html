<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CodePlayground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-content">
                <h1>Join Us Today!</h1>
                <p>Daftar sekarang dan mulai coding journey kamu</p>
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600&h=800&fit=crop" alt="Coding">
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="logo-section">
                    <i class="fas fa-code"></i>
                    <h2>CodePlayground</h2>
                </div>
                
                <form id="registerForm" class="auth-form">
                    <h3>Create Your Account</h3>
                    
                    <div class="form-group">
                        <label for="name">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="password" name="password" required placeholder="••••••••">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small>Minimal 8 karakter</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••">
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            <span>I agree to Terms & Conditions</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    
                    <button type="button" class="btn btn-secondary" onclick="location.href='login.html'">
                        <i class="fas fa-sign-in-alt"></i> Already Have Account
                    </button>
                    
                    <div class="back-home">
                        <a href="index.html">
                            <i class="fas fa-arrow-left"></i> Back to Home
                        </a>
                    </div>
                </form>
                
                <div id="verificationModal" class="modal">
                    <div class="modal-content">
                        <h3>Email Verification</h3>
                        <p>Masukkan 6 digit kode verifikasi yang dikirim ke email kamu</p>
                        <div class="verification-inputs">
                            <input type="text" maxlength="1" class="verify-input" data-index="0">
                            <input type="text" maxlength="1" class="verify-input" data-index="1">
                            <input type="text" maxlength="1" class="verify-input" data-index="2">
                            <input type="text" maxlength="1" class="verify-input" data-index="3">
                            <input type="text" maxlength="1" class="verify-input" data-index="4">
                            <input type="text" maxlength="1" class="verify-input" data-index="5">
                        </div>
                        <div class="modal-buttons">
                            <button class="btn btn-primary" onclick="verifyCode()">Verify</button>
                            <button class="btn btn-secondary" onclick="skipVerification()">Skip (Experimental)</button>
                        </div>
                    </div>
                </div>
                
                <div id="notification" class="notification"></div>
            </div>
        </div>
    </div>
    
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/protection.js"></script>
</body>
</html>
