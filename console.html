<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console - CodePlayground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <link rel="stylesheet" href="assets/css/console.css">
</head>
<body>
    <div class="console-container" id="languageSelector">
        <div class="selector-overlay">
            <div class="selector-content">
                <h1><i class="fas fa-code"></i> Select Your Language</h1>
                <p>Choose a programming language to start coding</p>
                
                <div class="language-grid">
                    <div class="lang-option" onclick="selectLanguage('101')">
                        <div class="lang-icon html">
                            <i class="fab fa-html5"></i>
                        </div>
                        <h3>HTML & CSS</h3>
                        <p>Build web pages</p>
                    </div>
                    
                    <div class="lang-option" onclick="selectLanguage('102')">
                        <div class="lang-icon js">
                            <i class="fab fa-js"></i>
                        </div>
                        <h3>JavaScript</h3>
                        <p>Add interactivity</p>
                    </div>
                    
                    <div class="lang-option" onclick="selectLanguage('103')">
                        <div class="lang-icon ts">
                            <i class="fas fa-code"></i>
                        </div>
                        <h3>TypeScript</h3>
                        <p>Type-safe JS</p>
                    </div>
                    
                    <div class="lang-option" onclick="selectLanguage('104')">
                        <div class="lang-icon python">
                            <i class="fab fa-python"></i>
                        </div>
                        <h3>Python</h3>
                        <p>Versatile language</p>
                    </div>
                    
                    <div class="lang-option" onclick="selectLanguage('105')">
                        <div class="lang-icon php">
                            <i class="fab fa-php"></i>
                        </div>
                        <h3>PHP</h3>
                        <p>Server-side scripting</p>
                    </div>
                    
                    <div class="lang-option" onclick="selectLanguage('106')">
                        <div class="lang-icon nodejs">
                            <i class="fab fa-node-js"></i>
                        </div>
                        <h3>Node.js</h3>
                        <p>JavaScript runtime</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="console-workspace" id="consoleWorkspace" style="display: none;">
        <div class="console-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-terminal"></i>
                    <span>Console</span>
                </div>
                <button class="sidebar-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="sidebar-actions">
                <button class="action-btn" onclick="createNewFile()" title="New File">
                    <i class="fas fa-file-plus"></i>
                </button>
                <button class="action-btn" onclick="createNewFolder()" title="New Folder">
                    <i class="fas fa-folder-plus"></i>
                </button>
                <button class="action-btn" onclick="uploadFile()" title="Upload">
                    <i class="fas fa-upload"></i>
                </button>
                <button class="action-btn" onclick="extractZip()" title="Extract ZIP">
                    <i class="fas fa-file-archive"></i>
                </button>
            </div>
            
            <div class="file-tree" id="fileTree">
                <div class="tree-item file active" data-file="main">
                    <i class="fas fa-file-code"></i>
                    <span>main.html</span>
                    <button class="delete-btn" onclick="deleteFile('main')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="console-main">
            <div class="console-header">
                <div class="header-left">
                    <button class="header-btn" onclick="location.href='profile.html?users.id=' + currentUserId">
                        <i class="fas fa-user"></i>
                    </button>
                    <button class="header-btn" onclick="location.href='chatbox.html?users.id=' + currentUserId">
                        <i class="fas fa-envelope"></i>
                        <span class="badge" id="messageCount">0</span>
                    </button>
                    <button class="header-btn" onclick="showFriends()">
                        <i class="fas fa-users"></i>
                    </button>
                </div>
                
                <div class="header-center">
                    <span class="current-lang" id="currentLang">HTML</span>
                </div>
                
                <div class="header-right">
                    <button class="header-btn" onclick="runCode()">
                        <i class="fas fa-play"></i> Run
                    </button>
                    <button class="header-btn" onclick="saveCode()">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="header-btn" onclick="showHistory()">
                        <i class="fas fa-history"></i>
                    </button>
                    <button class="header-btn" onclick="clearCode()">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button class="header-btn" onclick="changeLanguage()">
                        <i class="fas fa-exchange-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="console-editor-container">
                <div class="editor-panel">
                    <div class="panel-header">
                        <span><i class="fas fa-code"></i> Editor</span>
                        <div class="panel-actions">
                            <button onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                            <button onclick="formatCode()"><i class="fas fa-magic"></i></button>
                        </div>
                    </div>
                    <textarea id="codeEditor"></textarea>
                </div>
                
                <div class="output-panel">
                    <div class="panel-header">
                        <span><i class="fas fa-desktop"></i> Output</span>
                        <div class="panel-actions">
                            <button onclick="clearOutput()"><i class="fas fa-eraser"></i></button>
                            <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                    <iframe id="outputFrame" sandbox="allow-scripts allow-same-origin"></iframe>
                    <div id="consoleOutput" class="console-output"></div>
                </div>
            </div>
            
            <div class="console-terminal" id="consoleTerminal" style="display: none;">
                <div class="terminal-header">
                    <span><i class="fas fa-terminal"></i> Terminal</span>
                    <button onclick="toggleTerminal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="terminal-output" id="terminalOutput"></div>
                <div class="terminal-input">
                    <span class="terminal-prompt">$</span>
                    <input type="text" id="terminalInput" placeholder="Enter command...">
                </div>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileUpload" style="display: none;" multiple>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Modal</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modalConfirm">Confirm</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/php/php.min.js"></script>
    <script src="assets/js/console.js"></script>
    <script src="assets/js/protection.js"></script>
</body>
</html>
